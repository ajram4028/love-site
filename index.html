<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- ✅ MOBILE FIX ADDED -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
    color:white;

    background: linear-gradient(270deg, #0a0010, #200020, #400020);
    background-size: 800% 800%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* STARS ✨ */
.star {
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    animation: twinkle 2s infinite;
}
@keyframes twinkle {
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

.page {
    display:none;
    height:100vh;
    width:100vw;
    position:relative;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.active { display:flex; }

h1 {
    text-shadow: 0 0 15px pink, 0 0 30px red;
    animation: fadeIn 2s;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

button {
    padding:12px 25px;
    border:none;
    border-radius:25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
    transition:0.3s;
}
button:hover { transform:scale(1.1); }

#yesBtn {
    background:#ff4d88;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%{box-shadow:0 0 5px pink;}
    50%{box-shadow:0 0 20px red;}
    100%{box-shadow:0 0 5px pink;}
}

#noBtn {
    background:#555;
    position:absolute;
}

img {
    width:260px;
    border-radius:20px;
    margin:10px;
    animation: zoomFade 2s;
}
@keyframes zoomFade {
    from {opacity:0; transform:scale(0.8);}
    to {opacity:1; transform:scale(1);}
}

.heart {
    position:fixed;
    animation:float 4s linear infinite;
}
@keyframes float {
    0% {transform:translateY(0);}
    100% {transform:translateY(-100vh);}
}

/* CONFETTI */
.confetti {
    position:fixed;
    width:8px;
    height:8px;
    animation: fall 3s linear infinite;
}
@keyframes fall {
    0%{transform:translateY(-50px);}
    100%{transform:translateY(100vh);}
}

/* ✅ MOBILE RESPONSIVE FIX ONLY ADDED */
@media (max-width: 768px) {
    h1 { font-size:22px; padding:10px; }
    p { font-size:16px; padding:0 15px; }
    button { font-size:16px; padding:10px 18px; }
    img { width:90%; max-width:300px; }
    #noBtn { font-size:14px; padding:8px 12px; }
    .page { padding:10px; }
}
</style>
</head>

<body>

<div id="loading" class="page active"><h1 id="loadingText"></h1></div>

<div id="passwordPage" class="page">
<h1>Enter our special date 💕</h1>
<input type="password" id="pass" placeholder="DDMMYYYY">
<button onclick="checkPass()">Enter ❤️</button>
<p id="error"></p>
</div>

<div id="slideshow" class="page">
<img id="photo"><p id="caption"></p>
</div>

<div id="emotion" class="page"><h1 id="emotionText"></h1></div>

<div id="proposal" class="page">
<h1>Annamica… before we complete 1000 days… will you marry me? 💍</h1>
<button id="yesBtn" onclick="yesClicked()">YES 💖</button>
<button id="noBtn" onmouseover="moveNo()">NO 😈</button>
</div>

<div id="final" class="page">
<h1>💖 You are my forever Kuttyma 💖</h1>
<button onclick="showLetter()">One more surprise D Battu 💌</button>
</div>

<div id="letter" class="page">
<h1>I Love You So Much Annamica Devi ❤️</h1>
<p>You are the best thing that ever happened to me… forever yours 💖</p>
</div>
