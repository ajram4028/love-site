<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

.page {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active { display:flex; }

button {
    padding:12px 25px;
    border:none;
    border-radius:25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

#noBtn {
    position:absolute;
    background:gray;
}

#yesBtn { background:pink; }

img {
    width:250px;
    border-radius:20px;
    margin:10px;
}

.heart {
    position:fixed;
    animation:float 3s linear infinite;
}

@keyframes float {
    0% {transform:translateY(0);}
    100% {transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading" class="page active">
    <h1 id="loadingText"></h1>
</div>

<!-- PASSWORD -->
<div id="passwordPage" class="page">
    <h1>Enter our special date 💕</h1>
    <input type="password" id="pass" placeholder="DDMMYYYY">
    <button onclick="checkPass()">Enter ❤️</button>
    <p id="error"></p>
</div>

<!-- SLIDESHOW -->
<div id="slideshow" class="page">
    <img id="photo" src="">
    <p id="caption"></p>
</div>

<!-- EMOTIONAL -->
<div id="emotion" class="page">
    <h1 id="emotionText"></h1>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="page">
    <h1>Annamica… Will you marry me? 💍</h1>
    <button id="yesBtn" onclick="yesClicked()">YES 💖</button>
    <button id="noBtn" onmouseover="moveNo()">NO 😈</button>
</div>

<!-- FINAL -->
<div id="final" class="page">
    <h1>💖 You are my forever 💖</h1>
    <button onclick="showLetter()">One more surprise 💌</button>
</div>

<!-- LETTER -->
<div id="letter" class="page">
    <h1>I Love You ❤️</h1>
    <p>You are the best thing that ever happened to me… forever yours 💖</p>
</div>

<script>

// LOADING TEXT
let text = "Loading your memories...";
let i = 0;
let loadingText = document.getElementById("loadingText");

let typing = setInterval(() => {
    loadingText.innerHTML += text[i];
    i++;
    if(i >= text.length){
        clearInterval(typing);
        setTimeout(()=>{
            showPage("passwordPage");
        },1000);
    }
},50);

// PASSWORD
function checkPass(){
    let val = document.getElementById("pass").value;
    if(val === "29062023"){ // CHANGE THIS DATE
        showPage("slideshow");
        startSlideshow();
    } else {
        document.getElementById("error").innerText="Wrong 😏 try again";
    }
}

// SLIDESHOW
let photos = [
WhatsApp Image 2026-03-23 at 4.28.42 PM.jpeg
WhatsApp Image 2026-03-23 at 4.28.42 am.jpeg
"https://raw.githubusercontent.com/ajram4028/love-site/main/WhatsApp%20Image%202026-03-23%20at%204.28.43%20PM.jpeg"
];
    
let captions = [
"Our first memory ❤️",
"The best day with you 💫",
"Forever us 💕"
];

let index = 0;

function startSlideshow(){
    setInterval(()=>{
        document.getElementById("photo").src = photos[index];
        document.getElementById("caption").innerText = captions[index];
        index++;
        if(index >= photos.length){
            showEmotion();
        }
    },2000);
}

// EMOTIONAL TEXT
let emoText = ["We had ups…","We had downs…","But we never gave up ❤️"];
let emoIndex = 0;

function showEmotion(){
    showPage("emotion");
    let emo = document.getElementById("emotionText");

    let interval = setInterval(()=>{
        emo.innerText = emoText[emoIndex];
        emoIndex++;
        if(emoIndex >= emoText.length){
            clearInterval(interval);
            setTimeout(()=>showPage("proposal"),2000);
        }
    },2000);
}

// MOVE NO
function moveNo(){
    let btn = document.getElementById("noBtn");
    btn.style.left = Math.random()*80 + "%";
    btn.style.top = Math.random()*80 + "%";
}

// YES CLICK
function yesClicked(){
    showPage("final");

    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerText="💖";
        h.style.left=Math.random()*100+"vw";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),3000);
    },200);
}

// LETTER
function showLetter(){
    showPage("letter");
}

// PAGE SWITCH
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
