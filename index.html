<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
    color:white;

    background: linear-gradient(270deg, #1a001a, #330033, #660033, #330033);
    background-size: 800% 800%;
    animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.page {
    display:none;
    height:100vh;
    width:100vw;   /* ADD THIS */
    position:relative;  /* ADD THIS */
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
.active { display:flex; }

button {
    padding:12px 25px;
    border:none;
    border-radius:25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

#yesBtn {
    background: #ff4d88;
    color:white;
}

#noBtn {
    background: #555;
    color:white;
}

img {
    width:250px;
    border-radius:20px;
    margin:10px;
}

.heart {
    position:fixed;
    animation:float 3s linear infinite;
}

@keyframes float {
    0% {transform:translateY(0);}
    100% {transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading" class="page active">
    <h1 id="loadingText"></h1>
</div>

<!-- PASSWORD -->
<div id="passwordPage" class="page">
    <h1>Enter our special date 💕</h1>
    <input type="password" id="pass" placeholder="DDMMYYYY">
    <button onclick="checkPass()">Enter ❤️</button>
    <p id="error"></p>
</div>

<!-- SLIDESHOW -->
<div id="slideshow" class="page">
    <img id="photo" src="">
    <p id="caption"></p>
</div>

<!-- EMOTIONAL -->
<div id="emotion" class="page">
    <h1 id="emotionText"></h1>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="page">
    <h1>Annamica… before we complete 1000 days… will you marry me? 💍</h1>
    <button id="yesBtn" onclick="yesClicked()">YES 💖</button>
    <button id="noBtn" onmouseover="moveNo()">NO 😈</button>
</div>

<!-- FINAL -->
<div id="final" class="page">
    <h1>💖 You are my forever Kuttyma 💖</h1>
    <button onclick="showLetter()">One more surprise D Battu 💌</button>
</div>

<!-- LETTER -->
<div id="letter" class="page">
    <h1>I Love You So Much Annamica Devi ❤️</h1>
    <p>You are the best thing that ever happened to me… forever yours 💖</p>
</div>

<script>

// LOADING TEXT 💕
let text = "Tomorrow… we complete 1000 days together 💕";
let i = 0;
let loadingText = document.getElementById("loadingText");

let typing = setInterval(() => {
    loadingText.innerHTML += text[i];
    i++;
    if(i >= text.length){
        clearInterval(typing);
        setTimeout(()=>{
            loadingText.innerHTML = "1000 days of love… fights… memories… and us ❤️";
            setTimeout(()=>{
                showPage("passwordPage");
            },2000);
        },1000);
    }
},50);

// PASSWORD
function checkPass(){
    let val = document.getElementById("pass").value;
    if(val === "29062023"){
        showPage("slideshow");
        startSlideshow();
    } else {
        document.getElementById("error").innerText="Wrong 😏 try again";
    }
}

// SLIDESHOW
let photos = [
"https://raw.githubusercontent.com/ajram4028/love-site/main/WhatsApp%20Image%202026-03-23%20at%204.28.42%20PM.jpeg",
"https://raw.githubusercontent.com/ajram4028/love-site/main/WhatsApp%20Image%202026-03-23%20at%204.28.42%20PM.jpeg",
"https://raw.githubusercontent.com/ajram4028/love-site/main/WhatsApp%20Image%202026-03-23%20at%204.28.43%20PM.jpeg"
];

let captions = [
"Our first memory ❤️",
"The best day with you 💫",
"Forever us 💕"
];

let index = 0;

function startSlideshow(){
    let slide = setInterval(()=>{

        document.getElementById("photo").src = photos[index];
        document.getElementById("caption").innerText = captions[index];

        index++;

        if(index >= photos.length){
            clearInterval(slide);
            showEmotion();
        }

    },2000);
}

// EMOTIONAL TEXT 💖
let emoText = [
"From strangers… to something beautiful 💫",
"We laughed together 😄",
"We cried sometimes 😢",
"We fought… but never gave up ❤️",
"And now… we are about to complete 1000 days 💕",
"And still… I fall for you every single day 💖",
"So before we reach 1000 days…",
"I have one question for you… 💍"
];

let emoIndex = 0;

function showEmotion(){
    showPage("emotion");
    let emo = document.getElementById("emotionText");

    let interval = setInterval(()=>{
        emo.innerText = emoText[emoIndex];
        emoIndex++;
        if(emoIndex >= emoText.length){
            clearInterval(interval);
            setTimeout(()=>showPage("proposal"),2000);
        }
    },2000);
}

// NO BUTTON 😈
let noCount = 0;

function moveNo(){
    let btn = document.getElementById("noBtn");

    let texts = [
        "1000 days ah waste panna poriya? 😭",
        "Think about our 1000 days 😏",
        "Don't break my heart 💔",
        "Wrong choice 😜",
        "After 1000 days still NO ah? 😆",
        "Try YES kuttyma ❤️"
    ];

    btn.innerText = texts[Math.floor(Math.random() * texts.length)];

    btn.style.left = Math.random()*80 + "%";
    btn.style.top = Math.random()*80 + "%";

    noCount++;

    if(noCount >= 6){
        btn.style.display = "none";

        let msg = document.createElement("h2");
        msg.innerText = "Okay okay 😅 NO option removed… after 1000 days only YES allowed ❤️";
        msg.style.marginTop = "20px";
        msg.style.color = "pink";

        document.body.appendChild(msg);
    }
}

// YES CLICK 💕
function yesClicked(){
    showPage("final");

    document.querySelector("#final h1").innerText =
    "💖 Let’s make it not just 1000 days… but a lifetime together Kuttyma 💖";

    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerText="💖";
        h.style.left=Math.random()*100+"vw";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),3000);
    },200);
}

// LETTER
function showLetter(){
    showPage("letter");
}

// PAGE SWITCH
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
